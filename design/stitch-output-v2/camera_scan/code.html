<style>
        .camera-viewport {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-color: #000;
        }
        .scan-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 10;
        }
        .scan-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 200px;
            border: 2px dashed #2BB673;
            border-radius: 12px;
            background: transparent;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.4);
            z-index: 20;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-rg overflow-hidden">
<div class="camera-viewport">

</div>
<div class="scan-guide"></div>
<header class="fixed top-0 left-0 w-full z-30 flex justify-between items-center px-margin-mobile py-sm">
<button class="bg-surface/20 backdrop-blur-sm text-white p-2 rounded-full transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined block">close</span>
</button>
<div class="flex items-center bg-surface px-3 py-2 rounded-full border-[0.5px] border-on-surface/20 shadow-sm transition-all duration-200 active:scale-95">

<span class="font-ui-label-sm text-ui-label-sm text-on-surface">Translate to English</span>
</div>
</header>
<div class="fixed bottom-0 left-0 w-full z-30 pb-xl px-margin-mobile flex flex-col items-center gap-lg">
<div class="bg-surface/80 backdrop-blur-md border-[0.5px] border-on-surface/10 px-md py-sm rounded-xl max-w-[280px]">
<p class="font-body-sm text-body-sm text-on-surface text-center">
                Center the menu item within the dashed lines to scan and translate.
            </p>
</div>
<div class="flex items-center justify-between w-full max-w-sm px-xl">
<button class="text-white opacity-80 hover:opacity-100 transition-all duration-200 active:scale-90">
