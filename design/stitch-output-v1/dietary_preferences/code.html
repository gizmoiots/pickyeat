<body class="bg-background text-on-background font-body-lg min-h-screen relative overflow-x-hidden">
<div class="fixed inset-0 grain-overlay z-0"></div>
<!-- Header -->
<header class="relative z-10 px-md py-xl flex flex-col gap-sm max-w-xl mx-auto">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="mt-lg">
<h1 class="font-headline-md text-headline-md text-on-surface leading-tight">
        Quick question — any dietary preferences?
      </h1>
<p class="font-body-sm text-on-surface-variant mt-xs">
        Choose your lifestyle so we can tailor the flavors for you.
      </p>
</div>
</header>
<!-- Main Content: Diet Selection -->
<main class="relative z-10 px-md pb-xxl max-w-xl mx-auto">
<div class="flex flex-col gap-md">
<!-- Diet Option: Vegetarian (Selected State Example) -->
<button class="w-full flex items-center justify-between p-lg rounded-full bg-surface-container-low border-2 border-primary-container pill-shadow transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span aria-label="Vegetarian" class="text-2xl" role="img">🟢</span>
<span class="font-label-md text-on-surface text-lg">Vegetarian</span>
</div>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Diet Option: Vegan -->
<button class="w-full flex items-center justify-between p-lg rounded-full bg-surface-container-lowest border-2 border-transparent pill-shadow hover:border-outline-variant transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span aria-label="Vegan" class="text-2xl" role="img">🌱</span>
<span class="font-label-md text-on-surface text-lg">Vegan</span>
</div>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
<!-- Diet Option: Jain -->
<button class="w-full flex items-center justify-between p-lg rounded-full bg-surface-container-lowest border-2 border-transparent pill-shadow hover:border-outline-variant transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span aria-label="Jain" class="text-2xl" role="img">🟠</span>
<span class="font-label-md text-on-surface text-lg">Jain</span>
</div>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
<!-- Diet Option: Eggetarian -->
<button class="w-full flex items-center justify-between p-lg rounded-full bg-surface-container-lowest border-2 border-transparent pill-shadow hover:border-outline-variant transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span aria-label="Eggetarian" class="text-2xl" role="img">🥚</span>
<span class="font-label-md text-on-surface text-lg">Eggetarian</span>
</div>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
<!-- Diet Option: Non-Veg -->
<button class="w-full flex items-center justify-between p-lg rounded-full bg-surface-container-lowest border-2 border-transparent pill-shadow hover:border-outline-variant transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span aria-label="I eat everything" class="text-2xl" role="img">🔴</span>
<span class="font-label-md text-on-surface text-lg">I eat everything</span>
</div>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
<!-- Diet Option: Halal -->
<button class="w-full flex items-center justify-between p-lg rounded-full bg-surface-container-lowest border-2 border-transparent pill-shadow hover:border-outline-variant transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span aria-label="Halal only" class="text-2xl" role="img">☪️</span>
<span class="font-label-md text-on-surface text-lg">Halal only</span>
</div>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
</div>
<!-- Multi-lingual Indicator -->
<div class="mt-xl flex justify-center items-center gap-sm">
<span class="material-symbols-outlined text-outline text-[18px]">translate</span>
<span class="font-caption text-outline">Available in हिंदी, தமிழ், and 5 more</span>
</div>
</main>
<!-- Bottom Navigation / Actions -->
<footer class="fixed bottom-0 left-0 w-full p-md bg-surface/80 backdrop-blur-md z-20 flex flex-col items-center gap-md">
<button class="w-full max-w-xl bg-primary-container text-on-primary-container font-label-md text-lg py-md rounded-full shadow-lg active:scale-95 transition-transform">
      Continue
    </button>
<button class="font-label-md text-primary hover:opacity-80 transition-opacity pb-safe">
      Skip for now
    </button>
</footer>
<!-- Background Decorative Image (Asymmetric Layout Feel) -->
<div class="fixed -bottom-10 -right-20 opacity-10 pointer-events-none transform rotate-12">
<img class="w-80 h-80 object-cover rounded-full" data-alt="A macro photography shot of vibrant Indian spices like turmeric and chili powder arranged in artistic, soft-edged mounds on a textured ceramic surface. The lighting is warm and natural, casting soft shadows that emphasize the artisanal and organic feel of the culinary culture. The color palette is dominated by earthy oranges and deep reds, perfectly complementing the minimalist and premium UI design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjv1JucMSAmu6RnbAQshNlNUmb4jjK9yXEHSpxOINz8lBX0-VleF1Sjx-NrRxAFd0S50EV0bZfMPwxuE4Pb_a931vOG9QzC8zY2mrCbl8zVTiZUROKOfbdXIEoUulk87GXK2Z0QIvzU1f9ptAm6i5Qwb9kpsBSRKKdo3C9mvJhGwQaBZ73_GhLRtmmJfLtdsjFqvajlT_eh6jDbclPGjuB4rG87LBoQo52tVeMG5h5-vxR9xPtEH6rtRoS60ecVJCqoSClvRRaZYlD"/>
