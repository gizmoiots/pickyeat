<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-secondary-container": "#34704d",
                "on-tertiary-container": "#7a0e07",
                "on-secondary-fixed": "#002110",
                "surface-container-lowest": "#ffffff",
                "on-tertiary-fixed": "#410000",
                "primary-fixed-dim": "#ffb878",
                "surface-container-high": "#f0e6e0",
                "on-error": "#ffffff",
                "primary-fixed": "#ffdcc1",
                "tertiary-fixed": "#ffdad5",
                "on-surface-variant": "#534437",
                "tertiary": "#ab3326",
                "on-background": "#1f1b17",
                "background": "#fff8f4",
                "on-tertiary": "#ffffff",
                "on-secondary-fixed-variant": "#115131",
                "on-primary-fixed": "#2e1500",
                "tertiary-container": "#ff816f",
                "on-primary-container": "#5c3100",
                "inverse-surface": "#34302b",
                "surface-variant": "#eae1da",
                "surface-dim": "#e1d8d2",
                "secondary-fixed-dim": "#96d4aa",
                "on-error-container": "#93000a",
                "secondary-container": "#b1f1c5",
                "surface-bright": "#fff8f4",
                "on-surface": "#1f1b17",
                "secondary-fixed": "#b1f1c5",
                "primary": "#8e4f00",
                "error-container": "#ffdad6",
                "on-tertiary-fixed-variant": "#8a1b12",
                "secondary": "#2e6a47",
                "surface": "#fff8f4",
                "outline-variant": "#d9c2b2",
                "surface-container-highest": "#eae1da",
                "error": "#ba1a1a",
                "primary-container": "#e8923c",
                "surface-container": "#f6ece5",
                "inverse-on-surface": "#f9efe8",
                "on-primary-fixed-variant": "#6c3a00",
                "on-primary": "#ffffff",
                "outline": "#867465",
                "on-secondary": "#ffffff",
                "surface-container-low": "#fcf2eb",
                "tertiary-fixed-dim": "#ffb4a8",
                "surface-tint": "#8e4f00",
                "inverse-primary": "#ffb878"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "xxl": "48px",
                "sm": "8px",
                "xs": "4px",
                "md": "16px",
                "xl": "32px",
                "lg": "24px"
            },
            "fontFamily": {
                "title-lg": ["Fraunces"],
                "label-md": ["Plus Jakarta Sans"],
                "headline-md": ["Fraunces"],
                "body-lg": ["Plus Jakarta Sans"],
                "display-xl": ["Fraunces"],
                "caption": ["Plus Jakarta Sans"],
                "body-sm": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                "title-lg": ["28px", {"lineHeight": "1.3", "fontWeight": "500"}],
                "label-md": ["13px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                "headline-md": ["22px", {"lineHeight": "1.4", "fontWeight": "500"}],
                "body-lg": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                "display-xl": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                "caption": ["12px", {"lineHeight": "1.4", "fontWeight": "400"}],
                "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .camera-overlay {
            background: linear-gradient(rgba(142, 79, 0, 0.05), rgba(142, 79, 0, 0.05));
            border: 2px solid rgba(232, 146, 60, 0.3);
        }
        .grain-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 60;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .shutter-glow {
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.2), 0 0 20px rgba(232, 146, 60, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg overflow-hidden h-screen flex flex-col">
<div class="grain-texture"></div>
<!-- Camera Viewfinder -->
<div class="fixed inset-0 z-0 bg-inverse-surface">
<img alt="Menu scanning view" class="w-full h-full object-cover opacity-80" data-alt="A high-angle, cinematic view of a textured cream paper restaurant menu resting on a rustic wooden table. The lighting is warm and natural, casting soft shadows and highlighting the artisanal typography of the menu. Subtle saffron-colored floral patterns decorate the corners of the page. The overall mood is sophisticated and inviting, aligning with a premium Modern Indian digital hospitality aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD11w5Av3zNl_hdeT-xi5ytnMNU63nkn3TBfyvyBcHOIzpo4Mp6YUg9JPyDFOapMEM2Ju-TntxZjwCFZbD6KiiJGFvkOSrDbf3wombs9no2rok_r_4eVZnbpZ9PIw5Cvy1lEyObwmcLUhqaN5RBkHYKnrsPfj-vYa2zhGOwCjg0sLnuqL0rNvVsnleSJW1q22ZFexKptxKqy4869n1QLKJGOBiPOAiYTZUK5seWV7kQl3k2Ju0pX6k2aYahbnhXyiQ9FD_1T9VWlJqd"/>
<!-- Saffron tinted scanning frame -->
<div class="absolute inset-md md:inset-xl camera-overlay rounded-xl flex items-center justify-center">
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary-container rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary-container rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary-container rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary-container rounded-br-lg"></div>
</div>
</div>
<!-- Top App Bar (Custom for Camera) -->
<header class="relative z-50 flex justify-between items-center w-full px-md py-lg">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-low/90 backdrop-blur-md text-on-surface rounded-full shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-low/90 backdrop-blur-md text-on-surface rounded-full shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">flash_on</span>
</button>
</header>
<!-- Main Viewport Area -->
<main class="flex-grow relative z-10 flex flex-col items-center justify-end pb-xxl">
<!-- Floating Helper Text -->
<div class="mb-lg px-lg py-sm bg-inverse-surface/60 backdrop-blur-sm rounded-full text-surface-bright font-label-md text-label-md">
            Hold steady — we'll detect the menu.
        </div>
<!-- Camera Controls -->
<div class="w-full flex items-center justify-around px-xl max-w-md">
<!-- Multi-page Toggle -->
<button class="flex flex-col items-center gap-xs active:scale-90 transition-transform">
<div class="w-10 h-10 rounded-full border-2 border-surface-bright/50 flex items-center justify-center">
<span class="material-symbols-outlined text-surface-bright text-[20px]">filter_none</span>
</div>
<span class="text-surface-bright font-label-md text-[10px] tracking-wider">MULTI-PAGE</span>
</button>
<!-- Shutter Button -->
<button class="relative group">
<div class="w-20 h-20 bg-primary-container rounded-full shutter-glow active:scale-90 transition-all flex items-center justify-center">
<div class="w-16 h-16 rounded-full border-2 border-on-primary-container/20"></div>
</div>
</button>
<!-- Gallery Icon -->
<button class="flex flex-col items-center gap-xs active:scale-90 transition-transform">
<div class="w-10 h-10 rounded-xl bg-surface-container-low/20 backdrop-blur-md overflow-hidden border border-surface-bright/30">
<img alt="Gallery" class="w-full h-full object-cover opacity-90" data-alt="A small, vibrant thumbnail of a Mediterranean salad bowl with fresh greens, red tomatoes, and white feta cheese. The lighting is bright and summery. This image serves as a preview for a gallery selection in a premium food discovery application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuEbbOnJs3bH-RQeKsIo3iW1unmAP1prIBScJvcSFUZ71U7YGfv_BMclledDiKfW0yrw1iEZuI5F7rQ7wM9_uvIZ6gRXPxPLCVlVBhGXd4zRWXCJaww9nSFEyU1t_0MHaaX6aRqXPXgJQY3sSZ4SIu_xM9V0Ht_vFV3ikOazpHAz7AI8oryEAr72xei-974vnVL3K-r4NgOGrkjTC2zYqtKtH96Rvwe4jeKQlqwFMNttb8VSnHTO7lb9CP5qqe0tC7-K1NQizSJ-o3"/>
</div>
<span class="text-surface-bright font-label-md text-[10px] tracking-wider uppercase">GALLERY</span>
</button>
</div>
</main>
<!-- Post-Capture Bottom Strip (Hidden by default, shown for "After Capture" state) -->
<!-- Applying style_bg_color and style_shadows_and_elevation from BottomNavBar as guide -->
<section class="fixed bottom-0 w-full z-50 bg-surface/95 dark:bg-surface-dim/95 backdrop-blur-xl border-t border-outline-variant/30 rounded-t-[32px] px-md py-lg shadow-[0_-8px_24px_rgba(31,27,23,0.08)] transform translate-y-0 transition-transform duration-500">
<div class="flex flex-col gap-lg max-w-2xl mx-auto">
<!-- Thumbnail Strip -->
<div class="flex items-center gap-md overflow-x-auto pb-sm scrollbar-hide">
<div class="relative flex-shrink-0 group">
<img alt="Page 1" class="w-16 h-20 rounded-lg object-cover border-2 border-primary" data-alt="A vertical thumbnail image of a restaurant menu page featuring elegant serif typography and minimal line art of spices. The paper is a soft cream color, lit with warm side-lighting to reveal its subtle texture. This is part of a scan sequence for a high-end dining app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBarHmDjAlQYYZi5s7X7M51-mZ_SvrRG6nhSVXXbH9HuMYj1eXNooMXJe0fZkZlnF2nkpZN6G_Nx4_TfA_reun1d7xwQPpgfjcVu8JsQdP5Nn3GmBXFERv3IPzm_a0TARPUyrGAqfhFGqVocbgn6FNw0ya1pUklC3VB9ipsiebsbjw-zthJRqZlikZylA8FXQoCCsn4opqHh63kv_VhfBLRRzn_DA9wefGa5Sg8VGu5hEfzK-bYYYkdmQhOULqBm1wV1eBigsLxwtmN"/>
<button class="absolute -top-2 -right-2 bg-error text-on-error w-5 h-5 rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
<div class="flex-shrink-0">
<div class="w-16 h-20 rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-xs bg-surface-container-low hover:bg-surface-container transition-colors cursor-pointer">
<span class="material-symbols-outlined text-outline">add_a_photo</span>
<span class="text-[10px] font-label-md text-outline">ADD</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-md w-full">
<button class="flex-1 py-md px-lg rounded-full border border-secondary text-secondary font-label-md text-label-md hover:bg-secondary-container/20 transition-colors flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[18px]">add</span>
                    Add another page
                </button>
<button class="flex-1 py-md px-lg rounded-full bg-primary text-on-primary font-label-md text-label-md shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm">
                    Done
                    <span class="material-symbols-outlined text-[18px]">check_circle</span>
</button>
</div>
</div>
<!-- Safe area padding -->
<div class="h-6"></div>
</section>
</body></html>
