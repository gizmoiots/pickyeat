<body class="bg-background min-h-screen relative font-body-lg text-on-background selection:bg-primary-fixed">
<!-- Texture Overlay -->
<div class="fixed inset-0 grain-overlay z-50"></div>
<!-- Main Content Wrapper -->
<main class="max-w-md mx-auto px-md pt-xxl pb-xl flex flex-col min-h-screen">
<!-- Header Section -->
<header class="mb-xl">
<h1 class="font-title-lg text-title-lg text-on-surface mb-xs">Anything you're allergic to?</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">We'll quietly skip these.</p>
</header>
<!-- Allergens Grid -->
<div class="grid grid-cols-2 gap-md flex-grow">
<!-- Nut Allergy - Selected Example -->
<button class="relative flex items-center justify-between px-md py-lg rounded-full border-2 border-primary bg-surface-container-low shadow-sm transition-all duration-200 active:scale-95 group">
<div class="flex items-center gap-sm">
<span class="text-lg">🥜</span>
<span class="font-label-md text-label-md text-on-surface">Nuts</span>
</div>
<span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Dairy Allergy -->
<button class="flex items-center gap-sm px-md py-lg rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-surface-container transition-all duration-200 active:scale-95 group">
<span class="text-lg">🥛</span>
<span class="font-label-md text-label-md text-on-surface">Dairy</span>
</button>
<!-- Gluten Allergy -->
<button class="flex items-center gap-sm px-md py-lg rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-surface-container transition-all duration-200 active:scale-95 group">
<span class="text-lg">🌾</span>
<span class="font-label-md text-label-md text-on-surface">Gluten</span>
</button>
<!-- Eggs Allergy - Selected Example -->
<button class="relative flex items-center justify-between px-md py-lg rounded-full border-2 border-primary bg-surface-container-low shadow-sm transition-all duration-200 active:scale-95 group">
<div class="flex items-center gap-sm">
<span class="text-lg">🥚</span>
<span class="font-label-md text-label-md text-on-surface">Eggs</span>
</div>
<span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Shellfish Allergy -->
<button class="flex items-center gap-sm px-md py-lg rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-surface-container transition-all duration-200 active:scale-95 group">
<span class="text-lg">🦐</span>
<span class="font-label-md text-label-md text-on-surface">Shellfish</span>
</button>
<!-- Soy Allergy -->
<button class="flex items-center gap-sm px-md py-lg rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-surface-container transition-all duration-200 active:scale-95 group">
<span class="text-lg">🌱</span>
<span class="font-label-md text-label-md text-on-surface">Soy</span>
</button>
<!-- Fish Allergy -->
<button class="flex items-center gap-sm px-md py-lg rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-surface-container transition-all duration-200 active:scale-95 group">
<span class="text-lg">🐟</span>
<span class="font-label-md text-label-md text-on-surface">Fish</span>
</button>
<!-- Honey Allergy -->
<button class="flex items-center gap-sm px-md py-lg rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-surface-container transition-all duration-200 active:scale-95 group">
<span class="text-lg">🍯</span>
<span class="font-label-md text-label-md text-on-surface">Honey</span>
</button>
</div>
<!-- Sticky Bottom Actions -->
<footer class="mt-xxl flex flex-col items-center gap-lg">
<button class="w-full py-md bg-primary text-on-primary rounded-full font-label-md text-label-md shadow-md active:scale-95 transition-all duration-200">
                Done
            </button>
<button class="font-label-md text-label-md text-primary hover:opacity-80 transition-opacity">
                None of these
            </button>
</footer>
<!-- Contextual Visual (Subtle) -->
<div class="mt-xxl opacity-10 flex justify-center grayscale pointer-events-none">

</div>
