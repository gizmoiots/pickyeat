<style>@keyframes subtle-float {

<body class="bg-background text-on-background font-body-lg min-h-screen relative overflow-hidden flex flex-col">

<div class="mb-xxl animate-float flex flex-col items-center">

<!-- SVG Illustration of Chef's Hand holding a menu -->
<svg class="w-full h-full fill-none stroke-primary" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 200 200">

<path class="stroke-primary" d="M60 140c0 0-10 0-10-15s15-30 40-35s50-5 60 10s5 35-5 45s-25 15-35 10"></path>
<!-- Fingers/Menu Grip -->
<path d="M120 100c10-10 25-10 35 0s5 30-5 40"></path>
<!-- Menu Document -->
<rect class="stroke-primary fill-surface-container-low" height="85" rx="4" transform="rotate(-15 105 82)" width="60" x="75" y="40"></rect>
<!-- Saffron Detail Lines on Menu -->
<line class="stroke-primary-container" transform="rotate(-15 105 82)" x1="85" x2="115" y1="55" y2="48"></line>
<line class="stroke-primary-container" transform="rotate(-15 105 82)" x1="88" x2="118" y1="65" y2="58"></line>
<line class="stroke-primary-container" transform="rotate(-15 105 82)" x1="91" x2="121" y1="75" y2="68"></line>
<!-- Abstract Steam/Flavor Trails -->
<path class="stroke-primary-fixed opacity-60" d="M150 60c5-10 15-10 15 0s-10 15-15 10"></path>
<path class="stroke-primary-fixed opacity-40" d="M170 80c5-5 10-5 10 0s-5 10-10 5"></path>
</svg>
<!-- Inner soft glow -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl -z-10"></div>
</div>
</div>

<style>
