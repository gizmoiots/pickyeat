services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pickyeat
      POSTGRES_PASSWORD: pickyeat
      POSTGRES_DB: pickyeat
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
